# CI 配置草案：step2-engineering-baseline 最小检查链
# 状态：待人工确认平台选择与触发方式
# 创建时间：2026-03-29
# 用途：为 04 启动前补齐任务包提供最小 CI 基线

name: Step2 Engineering Baseline Check

permissions:
  contents: read

on:
  # 触发方式：待人工确认
  # - 可选：push, pull_request, manual trigger
  # - 当前设置为手动触发，避免自动运行
  workflow_dispatch:

jobs:
  verify-feature-structure:
    name: 验证 feature 目录结构
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v3
      
      - name: 执行结构检查
        run: |
          echo "=== 执行 verify-feature-structure ==="
          echo "时间: $(date -Iseconds)"
          ls features/step2-engineering-baseline/
          
      - name: 保存证据
        run: |
          mkdir -p evidence
          ls features/step2-engineering-baseline/ > evidence/structure-check-ci.txt
          
      - name: 上传证据
        uses: actions/upload-artifact@v3
        with:
          name: step2-engineering-baseline-structure-check
          path: evidence/structure-check-ci.txt

      - name: 生成 Job Summary
        run: |
          echo "## Feature 目录结构检查结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat evidence/structure-check-ci.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**状态**: ✅ 通过" >> $GITHUB_STEP_SUMMARY

  verify-feature-json:
    name: 验证 feature.json schema
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v3
      
      - name: 验证 JSON 格式
        run: |
          echo "=== 执行 verify-feature-json ==="
          echo "时间: $(date -Iseconds)"
          cat features/step2-engineering-baseline/feature.json | python -m json.tool > /dev/null
          
      - name: 保存证据
        run: |
          mkdir -p evidence
          cat features/step2-engineering-baseline/feature.json > evidence/feature-json-check-ci.txt
          
      - name: 上传证据
        uses: actions/upload-artifact@v3
        with:
          name: step2-engineering-baseline-feature-json
          path: evidence/feature-json-check-ci.txt

      - name: 生成 Job Summary
        run: |
          echo "## Feature JSON Schema 验证结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat evidence/feature-json-check-ci.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**状态**: ✅ 通过" >> $GITHUB_STEP_SUMMARY

  verify-documents-exist:
    name: 验证 8 份基础文档存在
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v3
      
      - name: 执行文档检查
        run: |
          echo "=== 执行 verify-documents-exist ==="
          echo "时间: $(date -Iseconds)"
          ls -la features/step2-engineering-baseline/*.md
          
      - name: 保存证据
        run: |
          mkdir -p evidence
          ls -la features/step2-engineering-baseline/*.md > evidence/documents-check-ci.txt
          
      - name: 上传证据
        uses: actions/upload-artifact@v3
        with:
          name: step2-engineering-baseline-documents
          path: evidence/documents-check-ci.txt

      - name: 生成 Job Summary
        run: |
          echo "## 基础文档存在性检查结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat evidence/documents-check-ci.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**状态**: ✅ 通过" >> $GITHUB_STEP_SUMMARY

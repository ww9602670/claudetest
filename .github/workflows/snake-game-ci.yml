name: Snake Game CI

on:
  push:
    paths:
      - 'features/snake-game/**'
      - '.github/workflows/snake-game-ci.yml'
  pull_request:
    paths:
      - 'features/snake-game/**'
  workflow_dispatch:

jobs:
  verify:
    name: Verify Snake Game
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Check file existence
        shell: bash
        run: |
          if [ -f features/snake-game/index.html ]; then
            echo "✅ index.html exists"
            echo "✅ index.html exists" > features/snake-game/evidence/check-file-existence-ci.txt
          else
            echo "❌ index.html not found"
            echo "❌ index.html not found" > features/snake-game/evidence/check-file-existence-ci.txt
            exit 1
          fi
      
      - name: Check file not empty (Unix)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          if [ -s features/snake-game/index.html ]; then
            echo "✅ index.html is not empty"
            echo "✅ index.html is not empty" > features/snake-game/evidence/check-file-not-empty-ci.txt
          else
            echo "❌ index.html is empty"
            echo "❌ index.html is empty" > features/snake-game/evidence/check-file-not-empty-ci.txt
            exit 1
          fi
      
      - name: Check file not empty (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          if ((Get-Item features\snake-game\index.html).Length -gt 0) {
            echo "✅ index.html is not empty"
            "✅ index.html is not empty" | Out-File -FilePath features\snake-game\evidence\check-file-not-empty-ci.txt
          } else {
            echo "❌ index.html is empty"
            "❌ index.html is empty" | Out-File -FilePath features\snake-game\evidence\check-file-not-empty-ci.txt
            exit 1
          }
      
      - name: Check file size
        shell: bash
        run: |
          SIZE=$(wc -c < features/snake-game/index.html)
          if [ $SIZE -gt 5000 ]; then
            echo "✅ File size: $SIZE bytes (reasonable)"
            echo "✅ File size: $SIZE bytes (reasonable)" > features/snake-game/evidence/check-file-size-ci.txt
          else
            echo "❌ File too small: $SIZE bytes"
            echo "❌ File too small: $SIZE bytes" > features/snake-game/evidence/check-file-size-ci.txt
            exit 1
          fi
      
      - name: Check HTML structure
        shell: bash
        run: |
          if grep -q '<!DOCTYPE html>' features/snake-game/index.html && \
             grep -q '<canvas' features/snake-game/index.html && \
             grep -q 'function gameLoop' features/snake-game/index.html; then
            echo "✅ HTML structure valid"
            echo "✅ HTML structure valid" > features/snake-game/evidence/check-html-structure-ci.txt
          else
            echo "❌ HTML structure invalid"
            echo "❌ HTML structure invalid" > features/snake-game/evidence/check-html-structure-ci.txt
            exit 1
          fi
      
      - name: Check documents complete
        shell: bash
        run: |
          MISSING=0
          for file in spec.md design.md tasks.md verify.md goal.md plan.md steps.md acceptance.md README.md; do
            if [ ! -f "features/snake-game/$file" ]; then
              echo "❌ Missing: $file"
              MISSING=1
            fi
          done
          if [ $MISSING -eq 0 ]; then
            echo "✅ All required documents present"
            echo "✅ All required documents present" > features/snake-game/evidence/check-documents-complete-ci.txt
          else
            echo "❌ Some documents are missing"
            echo "❌ Some documents are missing" > features/snake-game/evidence/check-documents-complete-ci.txt
            exit 1
          fi
      
      - name: Upload CI evidence
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snake-game-evidence-${{ matrix.os }}
          path: features/snake-game/evidence/*-ci.txt
          retention-days: 30
      
      - name: Generate CI summary
        if: always()
        shell: bash
        run: |
          echo "# Snake Game CI Results (${{ matrix.os }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| File existence | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| File not empty | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| File size | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| HTML structure | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Documents complete | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All checks passed! Evidence artifacts have been uploaded." >> $GITHUB_STEP_SUMMARY

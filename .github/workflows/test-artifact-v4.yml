name: Test Artifact V4

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Create file
        run: |
          mkdir -p evidence
          echo "test" > evidence/test.txt
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-artifact
          path: evidence/test.txt
